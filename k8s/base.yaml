          image: mirananightfall/a03-suilens-order:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: suilens-secrets
                  key: ORDER_DB_URL
            - name: CATALOG_SERVICE_URL
              value: http://catalog-service:3001
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: suilens-secrets
                  key: RABBITMQ_URL
---
apiVersion: v1
