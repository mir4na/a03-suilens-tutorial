events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream catalog_service {
    server catalog-service:3001;
  }

  upstream order_service {
    server order-service:3002;
  }

  upstream notification_service {
    server notification-service:3003;
  }

  server {
    listen 8080;

    location = /api/catalog/lenses {
      proxy_pass http://catalog_service/api/lenses;
    }

    location /api/catalog/lenses/ {
      proxy_pass http://catalog_service/api/lenses/;
    }

    location = /api/orders {
      proxy_pass http://order_service/api/orders;
    }

    location /api/orders/ {
      proxy_pass http://order_service/api/orders/;
    }

    location = /api/notifications {
      proxy_pass http://notification_service/api/notifications;
    }

    location /api/notifications/ {
      proxy_pass http://notification_service/api/notifications/;
    }

    location = /ws/notifications {
      proxy_pass http://notification_service/ws/notifications;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
    }

    location = /docs/catalog {
      proxy_pass http://catalog_service/docs;
    }

    location = /docs/orders {
      proxy_pass http://order_service/docs;
    }

    location = /docs/notifications {
      proxy_pass http://notification_service/docs;
    }
  }
}
